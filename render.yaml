services:
  - type: web
    name: portal-tymu
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_BASE
        value: https://generativelanguage.googleapis.com/v1beta
      - key: GEMINI_API_KEY
        sync: false
